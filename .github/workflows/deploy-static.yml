name: Deploy Static Site

on:
  push:
    branches:
      - main
    paths:
      - index.html
      - styles.css
      - app.js
      - config.js
      - .github/workflows/deploy-static.yml
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Prepare static files
        run: |
          mkdir public-dist
          cp index.html styles.css app.js config.js public-dist/

      - name: Validate CloudBase secrets
        env:
          TENCENTCLOUD_SECRETID: ${{ secrets.TENCENTCLOUD_SECRETID || secrets.TENCENTCLOUD_SECRET_ID || secrets.SECRET_ID }}
          TENCENTCLOUD_SECRETKEY: ${{ secrets.TENCENTCLOUD_SECRETKEY || secrets.TENCENTCLOUD_SECRET_KEY || secrets.SECRET_KEY }}
        run: |
          if [ -z "$TENCENTCLOUD_SECRETID" ] || [ -z "$TENCENTCLOUD_SECRETKEY" ]; then
            echo "::error::Missing GitHub Secrets. Add TENCENTCLOUD_SECRETID and TENCENTCLOUD_SECRETKEY in Settings -> Secrets and variables -> Actions."
            exit 1
          fi
          if [[ "$TENCENTCLOUD_SECRETID" != AKID* ]]; then
            echo "::error::TENCENTCLOUD_SECRETID should usually start with AKID. Check that you did not use APPID, CloudBase env id, or another value."
            exit 1
          fi
          if [[ "$TENCENTCLOUD_SECRETID" == *"="* || "$TENCENTCLOUD_SECRETKEY" == *"="* ]]; then
            echo "::error::Secret values should only contain the credential value, not KEY=value or quotes."
            exit 1
          fi

      - name: Login to CloudBase CLI
        timeout-minutes: 2
        env:
          TENCENTCLOUD_SECRETID: ${{ secrets.TENCENTCLOUD_SECRETID || secrets.TENCENTCLOUD_SECRET_ID || secrets.SECRET_ID }}
          TENCENTCLOUD_SECRETKEY: ${{ secrets.TENCENTCLOUD_SECRETKEY || secrets.TENCENTCLOUD_SECRET_KEY || secrets.SECRET_KEY }}
        run: |
          npx --yes -p @cloudbase/cli@latest tcb login --apiKeyId "$TENCENTCLOUD_SECRETID" --apiKey "$TENCENTCLOUD_SECRETKEY"

      - name: Deploy to CloudBase static hosting
        timeout-minutes: 5
        run: |
          npx --yes -p @cloudbase/cli@latest tcb hosting deploy ./public-dist / -e career-archive-d6g3v2mm182ce6b11
